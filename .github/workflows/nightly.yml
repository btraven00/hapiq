name: Nightly Release

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC every day
  workflow_dispatch:        # allow manual trigger from the Actions tab

env:
  GO_VERSION: "1.25.9"

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="nightly-$(date -u +%Y%m%d)-$(git rev-parse --short HEAD)"
          mkdir -p dist
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/hapiq-${GOOS}-${GOARCH}${EXT}" \
            .

      - name: Archive (unix)
        if: matrix.goos != 'windows'
        run: |
          cd dist
          tar -czf "hapiq-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" \
            "hapiq-${{ matrix.goos }}-${{ matrix.goarch }}"

      - name: Archive (windows)
        if: matrix.goos == 'windows'
        run: |
          cd dist
          zip "hapiq-${{ matrix.goos }}-${{ matrix.goarch }}.zip" \
            "hapiq-${{ matrix.goos }}-${{ matrix.goarch }}.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: hapiq-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/hapiq-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
            dist/hapiq-${{ matrix.goos }}-${{ matrix.goarch }}.zip
          if-no-files-found: error
          retention-days: 1   # artifacts are only needed until the publish step

  publish:
    name: Publish nightly release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Collect artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Compute build metadata
        id: meta
        run: |
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # Delete the previous nightly release+tag so the new one starts clean.
      # '|| true' makes the step succeed even when no prior nightly exists.
      - name: Delete previous nightly release
        run: gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly ${{ steps.meta.outputs.date }}"
          prerelease: true
          make_latest: false
          generate_release_notes: false
          files: dist/*
          body: |
            Automated nightly build from `main`.

            **Commit:** ${{ github.sha }} (`${{ steps.meta.outputs.sha }}`)
            **Built:** ${{ steps.meta.outputs.date }}

            ### Install

            **Linux / macOS**
            ```bash
            # replace <os> with linux or darwin, <arch> with amd64 or arm64
            curl -L https://github.com/btraven00/hapiq/releases/download/nightly/hapiq-<os>-<arch>.tar.gz \
              | tar -xz
            chmod +x hapiq-<os>-<arch>
            sudo mv hapiq-<os>-<arch> /usr/local/bin/hapiq
            ```

            **Windows** — download the `.zip`, extract, and add to `PATH`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
